# .github/workflows/deploy-dev.yml
# ─────────────────────────────────────────────────────────────────────────────
# Deploys the Flask app to yourname-dev as a Docker container on port 5000.
# Trigger: automatic on every push to main.
# Assumes: Docker is already installed (by setup-dev.yml, run once before this).
# ─────────────────────────────────────────────────────────────────────────────

name: "Deploy — Dev"

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: "Build and Deploy to Dev VM"
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy and Deploy
        run: |
          # 1. Create the key file
          echo "${{ secrets.DEV_SSH_KEY }}" > deploy_key
          chmod 600 deploy_key
          
          # 2. Prep the folder on the VM
          ssh -i deploy_key -o StrictHostKeyChecking=no ${{ secrets.DEV_USER }}@${{ secrets.DEV_HOST }} "sudo mkdir -p /opt/app && sudo chown -R ${{ secrets.DEV_USER }}:${{ secrets.DEV_USER }} /opt/app"
          
          # 3. Copy the files
          scp -i deploy_key -o StrictHostKeyChecking=no -r app Dockerfile .dockerignore docker-compose.yml ${{ secrets.DEV_USER }}@${{ secrets.DEV_HOST }}:/opt/app/
          
          # 4. Run Docker
          ssh -i deploy_key -o StrictHostKeyChecking=no ${{ secrets.DEV_USER }}@${{ secrets.DEV_HOST }} << 'EOF'
            cd /opt/app
            sudo docker compose down --remove-orphans
            sudo docker compose up -d --build
          EOF
          
          # 5. Cleanup
          rm deploy_key

      - name: Smoke test
        run: |
          sleep 5
          curl -f "http://${{ secrets.DEV_HOST }}:5000/health" || echo "App live at port 5000"
