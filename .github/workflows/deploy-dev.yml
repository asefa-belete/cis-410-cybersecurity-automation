# .github/workflows/deploy-dev.yml
# ─────────────────────────────────────────────────────────────────────────────
# Deploys the Flask app to yourname-dev as a Docker container on port 5000.
# Trigger: automatic on every push to main.
# Assumes: Docker is already installed (by setup-dev.yml, run once before this).
# ─────────────────────────────────────────────────────────────────────────────

name: "Deploy — Dev"

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: "Build and Deploy to Dev VM"
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # This version uses a safer way to move files
      - name: Deploy to Server
        run: |
        
          echo "${{ secrets.DEV_SSH_KEY }}" > deploy_key
          chmod 600 deploy_key
          
          # 1. Prepare directory and fix permissions
          ssh -i deploy_key -o StrictHostKeyChecking=no ${{ secrets.DEV_USER }}@${{ secrets.DEV_HOST }} "sudo mkdir -p /opt/app && sudo chown -R ${{ secrets.DEV_USER }}:${{ secrets.DEV_USER }} /opt/app"
          
          # 2. Copy everything in the current folder to the VM
          scp -i deploy_key -o StrictHostKeyChecking=no -r ./* ${{ secrets.DEV_USER }}@${{ secrets.DEV_HOST }}:/opt/app/
          
          # 3. Restart the container
          ssh -i deploy_key -o StrictHostKeyChecking=no ${{ secrets.DEV_USER }}@${{ secrets.DEV_HOST }} "cd /opt/app && sudo docker compose down --remove-orphans && sudo docker compose up -d --build"
          
          rm deploy_key

      - name: Smoke test
        run: |
          sleep 10
          curl -s http://${{ secrets.DEV_HOST }}:5000/health || echo "Wait for app..."
