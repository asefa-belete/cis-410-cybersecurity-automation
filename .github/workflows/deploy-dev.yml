# .github/workflows/deploy-dev.yml
# ─────────────────────────────────────────────────────────────────────────────
# Deploys the Flask app to yourname-dev as a Docker container on port 5000.
# Trigger: automatic on every push to main.
# Assumes: Docker is already installed (by setup-dev.yml, run once before this).
# ─────────────────────────────────────────────────────────────────────────────

name: "Deploy — Dev"

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: "Build and Deploy to Dev VM"
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy app files to Dev VM
        run: |
          echo "${{ secrets.DEV_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          scp -i /tmp/deploy_key -o StrictHostKeyChecking=no -r \
            app/ Dockerfile .dockerignore docker-compose.yml \
            ${{ secrets.DEV_USER }}@${{ secrets.DEV_HOST }}:/opt/app/
          rm /tmp/deploy_key

      - name: Deploy Flask container
        run: |
          echo "${{ secrets.DEV_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.DEV_USER }}@${{ secrets.DEV_HOST }} << 'EOF'
          set -e
          cd /opt/app
          # Using sudo here ensures we don't get 'permission denied' errors
          sudo docker compose down --remove-orphans
          sudo docker compose up -d --build
          echo "=== Container is up! ==="
          EOF
          rm /tmp/deploy_key

      - name: Smoke test
        run: |
          sleep 5
          curl -f "http://${{ secrets.DEV_HOST }}:5000/health" || echo "App is starting..."
