# .github/workflows/deploy-staging.yml
# ─────────────────────────────────────────────────────────────────────────
# Lean deploy — Docker already installed by setup-staging.yml.
# Trigger: manual only (workflow_dispatch).
# ─────────────────────────────────────────────────────────────────────────

name: "Deploy — Staging"


on:

  workflow_dispatch:

    inputs:

      reason:
        description: 'Reason for this deployment (e.g. QA approved)'
        required: false

jobs:

  deploy:

    name: "Deploy to Staging"

    runs-on: self-hosted


    steps:

      - name: Checkout

        uses: actions/checkout@v4


      - name: Log deployment reason

        run: echo "STAGING DEPLOY — ${{ github.event.inputs.reason || 'no reason provided' }} — ${{ github.actor }}"

      # Step 3: Copy app files - FIXED: No more '.' in scp
      - name: Copy app files to Staging VM

        run: |

          echo "${{ secrets.STAGING_SSH_KEY }}" > /tmp/staging_key

          chmod 600 /tmp/staging_key
          # Ensure the target directory exists and is owned by the student user
          ssh -i /tmp/staging_key -o StrictHostKeyChecking=no ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} "sudo mkdir -p /opt/app && sudo chown ${{ secrets.STAGING_USER }}:${{ secrets.STAGING_USER }} /opt/app"
          # Copy specific files only
          scp -i /tmp/staging_key -o StrictHostKeyChecking=no -r \
            app/ Dockerfile .dockerignore docker-compose.yml \
            ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/opt/app/
          rm /tmp/staging_key

      # Step 4: Build and start the container
      - name: Deploy Flask container on Staging

        run: |

          echo "${{ secrets.STAGING_SSH_KEY }}" > /tmp/staging_key

          chmod 600 /tmp/staging_key
          ssh -i /tmp/staging_key -o StrictHostKeyChecking=no \
            ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} << 'EOF'
          set -e
          cd /opt/app
          export DEPLOY_TIME="$(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          export GITHUB_SHA="${{ github.sha }}"
          export GITHUB_REF_NAME="${{ github.ref_name }}"
          export HOST_PORT=5001
          export ENVIRONMENT=staging
          
          echo "=== Deploying ${GITHUB_SHA:0:7} to staging (port ${HOST_PORT}) ==="
          
          # Use sudo -E to preserve environment variables for Docker Compose
          sudo -E HOST_PORT="${HOST_PORT}" ENVIRONMENT="${ENVIRONMENT}" docker compose down --remove-orphans
          sudo -E HOST_PORT="${HOST_PORT}" ENVIRONMENT="${ENVIRONMENT}" \
               DEPLOY_TIME="${DEPLOY_TIME}" GITHUB_SHA="${GITHUB_SHA}" \
               GITHUB_REF_NAME="${GITHUB_REF_NAME}" \
               docker compose up -d --build
               
          echo '=== Staging deploy complete ==='
          sudo docker compose ps
          EOF

          rm /tmp/staging_key

      # Step 5: Smoke test
      - name: Smoke test

        run: |
          sleep 5
          curl -f "http://${{ secrets.STAGING_HOST }}:5001/health" | python3 -m json.tool

          echo '=== Staging smoke test passed ==='
          