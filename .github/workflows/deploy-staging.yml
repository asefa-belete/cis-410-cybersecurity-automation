# .github/workflows/deploy-staging.yml

# ─────────────────────────────────────────────────────────────────────────

# Lean deploy — Docker already installed by setup-staging.yml.

# Trigger: manual only (workflow_dispatch).

# reason is optional for staging — required on production.

#

# No Docker required on yourname-runner — uses native ssh and scp only.

# ─────────────────────────────────────────────────────────────────────────

name: "Deploy — Staging"


on:
  workflow_dispatch:
    inputs:

      reason:
        description: 'Reason for this deployment'
        required: false

jobs:

  deploy:

    name: "Deploy to Staging"

    runs-on: self-hosted


    steps:



      - name: Checkout

        uses: actions/checkout@v4









      - name: Log deployment reason

        run: echo "STAGING DEPLOY — ${{ github.event.inputs.reason || 'no reason provided' }} — ${{ github.actor }}"









      - name: Copy app files to Staging VM

        run: |

          echo "${{ secrets.STAGING_SSH_KEY }}" > /tmp/staging_key

          chmod 600 /tmp/staging_key
          ssh -i /tmp/staging_key -o StrictHostKeyChecking=no ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} "sudo mkdir -p /opt/app && sudo chown ${{ secrets.STAGING_USER }}:${{ secrets.STAGING_USER }} /opt/app"
          scp -i /tmp/staging_key -o StrictHostKeyChecking=no -r app/ Dockerfile .dockerignore docker-compose.yml ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/opt/app/
          rm /tmp/staging_key




      - name: Deploy Flask container on Staging

        run: |

          echo "${{ secrets.STAGING_SSH_KEY }}" > /tmp/staging_key

          chmod 600 /tmp/staging_key
          ssh -i /tmp/staging_key -o StrictHostKeyChecking=no ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} << 'EOF'
            set -e
            cd /opt/app

            export HOST_PORT=5001
            export ENVIRONMENT=staging
            export GITHUB_SHA="${{ github.sha }}"
            # -E is critical here to pass the environment variables
            sudo -E docker compose down --remove-orphans
            sudo -E docker compose up -d --build

          EOF
          
          rm /tmp/staging_key










      - name: Smoke test

        run: |
          sleep 5
          curl -f "http://${{ secrets.STAGING_HOST }}:5001/health" | python3 -m json.tool
          echo '=== Staging smoke test passed ==='