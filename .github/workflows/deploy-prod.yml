# .github/workflows/deploy-prod.yml

# ─────────────────────────────────────────────────────────────────────────

# Lean deploy — Docker already installed by setup-prod.yml.

# Trigger: manual only (workflow_dispatch).

# reason is REQUIRED — every production deploy needs an audit trail.

# GitHub enforces this: the Run workflow button is disabled until you type a reason.

#

# No Docker required on yourname-runner — uses native ssh and scp only.

# ─────────────────────────────────────────────────────────────────────────


name: "Deploy — Production"


on:

  workflow_dispatch:

    inputs:

      reason:

        description: 'Reason for this deployment (required — audit trail)'
        required: true 

jobs:

  deploy:

    name: "Deploy to Production"

    runs-on: self-hosted


    steps:

      - name: Checkout

        uses: actions/checkout@v4










      - name: Copy app files to Production VM

        run: |

          echo "${{ secrets.PROD_SSH_KEY }}" > /tmp/prod_key

          chmod 600 /tmp/prod_key
          scp -i /tmp/prod_key -o StrictHostKeyChecking=no -r app/ Dockerfile docker-compose.yml ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:/opt/app/
          rm /tmp/prod_key



      - name: Deploy Flask container on Production

        run: |

          echo "${{ secrets.PROD_SSH_KEY }}" > /tmp/prod_key

          chmod 600 /tmp/prod_key
          ssh -i /tmp/prod_key -o StrictHostKeyChecking=no ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} << 'EOF'
            set -e
            cd /opt/app
            export HOST_PORT=5002
            export ENVIRONMENT=production
            export GITHUB_SHA=${{ github.sha }}
            export DEPLOY_TIME="$(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            
            sudo -E docker compose down --remove-orphans
            sudo -E HOST_PORT=${HOST_PORT} ENVIRONMENT=${ENVIRONMENT} DEPLOY_TIME="${DEPLOY_TIME}" GITHUB_SHA="${GITHUB_SHA}" docker compose up -d --build
          EOF

          rm /tmp/prod_key




      - name: Smoke test

        run: |
          sleep 5
          curl -f "http://${{ secrets.PROD_HOST }}:5002/health" | python3 -m json.tool

           echo '=== Production smoke test passed ==='