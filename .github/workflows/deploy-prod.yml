# .github/workflows/deploy-prod.yml

# ─────────────────────────────────────────────────────────────────────────
# Production deployment with audit trail and Port 5002 support.
# ─────────────────────────────────────────────────────────────────────────


name: "Deploy — Production"


on:

  workflow_dispatch:

    inputs:

      reason:

        description: 'Reason for this deployment (required — audit trail)'
        required: true 

jobs:

  deploy:

    name: "Deploy to Production"

    runs-on: self-hosted


    steps:

      - name: Checkout

        uses: actions/checkout@v4









      - name: Log deployment reason

        run: |

          echo "=== PRODUCTION DEPLOY ==="

          echo "Triggered by: ${{ github.actor }}"

          echo "Reason: ${{ github.event.inputs.reason }}"

          echo "Commit: ${{ github.sha }}"

          echo "Branch: ${{ github.ref_name }}"

          echo "Timestamp: $(date -u)"

      # Step 3: Copy app files
      # Removed .dockerignore from list to avoid "No such file" errors
      - name: Copy app files to Production VM

        run: |

          echo "${{ secrets.PROD_SSH_KEY }}" > /tmp/prod_key

          chmod 600 /tmp/prod_key

          scp -i /tmp/prod_key -o StrictHostKeyChecking=no -r \
            app/ Dockerfile docker-compose.yml \
            ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:/opt/app/

          rm /tmp/prod_key


      # Step 4: Build and start the container
      # Using sudo -E to ensure HOST_PORT=5002 reaches the dashboard
      - name: Deploy Flask container on Production

        run: |

          echo "${{ secrets.PROD_SSH_KEY }}" > /tmp/prod_key

          chmod 600 /tmp/prod_key

          ssh -i /tmp/prod_key -o StrictHostKeyChecking=no \

            ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} << 'EOF'

          set -e

          cd /opt/app

          export DEPLOY_TIME="$(date -u +'%Y-%m-%d %H:%M:%S UTC')"

          export GITHUB_SHA="${{ github.sha }}"

          export GITHUB_REF_NAME="${{ github.ref_name }}"

          export HOST_PORT=5002

          export ENVIRONMENT=production
          
          echo "=== Deploying ${GITHUB_SHA:0:7} to production (port ${HOST_PORT}) ==="
          
          sudo -E docker compose down --remove-orphans
          
          sudo -E HOST_PORT="${HOST_PORT}" ENVIRONMENT="${ENVIRONMENT}" \
               DEPLOY_TIME="${DEPLOY_TIME}" GITHUB_SHA="${GITHUB_SHA}" \

               GITHUB_REF_NAME="${GITHUB_REF_NAME}" \

               docker compose up -d --build
               
          echo '=== Production deploy complete ==='

          sudo docker compose ps

          EOF

          rm /tmp/prod_key


      # Step 5: Smoke test on port 5002

      - name: Smoke test

        run: |
          sleep 5
          curl -f "http://${{ secrets.PROD_HOST }}:5002/health" | python3 -m json.tool

          echo '=== Production smoke test passed ==='
          