# .github/workflows/setup-dev.yml
# ─────────────────────────────────────────────────────────────────────────────
# ONE-TIME: configures passwordless sudo and installs Docker on yourname-dev.
# Trigger: manual (workflow_dispatch) — run ONCE after provisioning the Dev VM.
# ─────────────────────────────────────────────────────────────────────────────

name: "Setup — Dev Server"

on:
  workflow_dispatch:   # Manual trigger only

jobs:
  setup:
    name: "Install Docker on Dev VM"
    runs-on: self-hosted
    env:
      # Fix for the Node.js deprecation warning in 2026
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Step 1: Configure passwordless sudo ────────────────────────────────
      - name: Configure passwordless sudo
        run: |
          echo "${{ secrets.DEV_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.DEV_USER }}@${{ secrets.DEV_HOST }} \
            "set -e
            if sudo -n true 2>/dev/null; then
              echo '=== Passwordless sudo already configured — skipping ==='
            else
              echo '=== Configuring passwordless sudo ==='
              echo '${{ secrets.SUDO_PASS }}' | sudo -S bash -c \
                'echo \"${{ secrets.DEV_USER }} ALL=(ALL) NOPASSWD:ALL\" > /etc/sudoers.d/${{ secrets.DEV_USER }} && chmod 0440 /etc/sudoers.d/${{ secrets.DEV_USER }}'
              echo '=== Passwordless sudo configured ==='
            fi"

          rm /tmp/deploy_key

      # ── Step 2: Install Docker Engine ──────────────────────────────────────
      - name: Install Docker on Dev VM
        run: |
          echo "${{ secrets.DEV_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.DEV_USER }}@${{ secrets.DEV_HOST }} << 'EOF'
          set -e
          if ! command -v docker &> /dev/null; then
            echo "=== Docker not found — installing ==="
            curl -fsSL https://get.docker.com -o get-docker.sh
            sudo sh get-docker.sh
            sudo usermod -aG docker $(whoami)
            sudo mkdir -p /opt/app && sudo chown $(whoami):$(whoami) /opt/app
            rm get-docker.sh
            echo "=== Docker installed successfully ==="
          else
            echo "=== Docker already present — skipping install ==="
            sudo mkdir -p /opt/app && sudo chown $(whoami):$(whoami) /opt/app
          fi
          EOF

          rm /tmp/deploy_key

      # ── Step 3: Verify the installation ────────────────────────────────────
      - name: Verify Docker
        run: |
          echo "${{ secrets.DEV_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.DEV_USER }}@${{ secrets.DEV_HOST }} << 'EOF'
          set -e
          echo "=== Logged in as: $(whoami) ==="
          docker --version
          docker compose version
          echo "=== Deployment directory ==="
          ls -la /opt/app
          echo "=== Dev server is ready for deployment ==="
          EOF

          rm /tmp/deploy_key
